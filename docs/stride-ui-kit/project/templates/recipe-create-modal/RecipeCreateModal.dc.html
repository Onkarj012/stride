<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="RecipeCreateModal" description="Recipe creation modal — fixed height between modes, textarea ingredient and step inputs (5 rows)" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    [data-rcm-tab]{flex:1;padding:8px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:Manrope,sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;color:rgba(13,16,27,.45);}
    [data-rcm-tab="manual"]{background:white;color:#0d101b;box-shadow:0 1px 3px rgba(0,0,0,.08);}
    [data-rcm-tab="ai"]{background:white;color:#b3a0ff;box-shadow:0 1px 3px rgba(0,0,0,.08);}
    [data-rcm-tag]{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;font-family:Manrope,sans-serif;transition:all .15s;border:1px solid rgba(13,16,27,.12);background:white;color:rgba(13,16,27,.55);}
    [data-rcm-tag="true"]{background:#0d101b;color:white;border-color:#0d101b;}
  </style>
</helmet>

<!-- Backdrop -->
<div style="position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(13,16,27,0.4);backdrop-filter:blur(4px);">

  <!-- Modal — fixed height so it never resizes between Manual / AI -->
  <div style="font-family:Manrope,sans-serif;width:100%;max-width:560px;height:680px;background:#f8f8f8;border-radius:24px;box-shadow:0 30px 80px rgba(13,16,27,0.3);display:flex;flex-direction:column;overflow:hidden;">

    <!-- ── Header ── -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:24px 24px 0;flex-shrink:0;">
      <h2 style="margin:0;font-size:22px;font-weight:800;color:#0d101b;letter-spacing:-0.5px;">New recipe</h2>
      <button onClick="{{ onClose }}" aria-label="Close" style="width:36px;height:36px;border-radius:50%;background:rgba(13,16,27,0.06);border:none;display:flex;align-items:center;justify-content:center;color:rgba(13,16,27,0.55);cursor:pointer;flex-shrink:0;" style-hover="background:rgba(13,16,27,0.1)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
      </button>
    </div>

    <!-- ── Mode toggle ── -->
    <div style="padding:14px 24px 0;flex-shrink:0;">
      <div style="display:flex;gap:4px;padding:4px;background:rgba(13,16,27,0.06);border-radius:12px;">
        <button onClick="{{ setManual }}" data-rcm-tab="{{ manualTabKey }}">Manual</button>
        <button onClick="{{ setAI }}"     data-rcm-tab="{{ aiTabKey }}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
          Use AI
        </button>
      </div>
    </div>

    <!-- ── Scrollable content ── -->
    <div style="flex:1;overflow-y:auto;padding:16px 24px 0;">
      <div style="display:flex;flex-direction:column;gap:14px;padding-bottom:8px;">

        <!-- MANUAL MODE -->
        <sc-if value="{{ isManual }}" hint-placeholder-val="{{ true }}">

          <input placeholder="Recipe name" value="{{ name }}" onChange="{{ setName }}"
            style="width:100%;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:500;font-family:Manrope,sans-serif;color:#0d101b;outline:none;box-sizing:border-box;background:white;border:1px solid rgba(13,16,27,0.08);transition:border-color 0.15s;" />

          <textarea placeholder="Short description" value="{{ blurb }}" onChange="{{ setBlurb }}" rows="2"
            style="width:100%;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:500;font-family:Manrope,sans-serif;color:#0d101b;outline:none;box-sizing:border-box;background:white;border:1px solid rgba(13,16,27,0.08);resize:none;"></textarea>

          <!-- Tags -->
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            <button onClick="{{ setBreakfast }}" data-rcm-tag="{{ isBreakfast }}">Breakfast</button>
            <button onClick="{{ setLunch }}"     data-rcm-tag="{{ isLunch }}">Lunch</button>
            <button onClick="{{ setDinner }}"    data-rcm-tag="{{ isDinner }}">Dinner</button>
            <button onClick="{{ setSnack }}"     data-rcm-tag="{{ isSnack }}">Snack</button>
          </div>

          <!-- Prep + Servings -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <label style="display:block;">
              <span style="font-size:11px;font-weight:700;color:rgba(13,16,27,0.45);margin-bottom:6px;display:block;">Prep (min)</span>
              <input type="number" min="0" value="{{ prepMin }}" onChange="{{ setPrepMin }}"
                style="width:100%;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:500;font-family:Manrope,sans-serif;color:#0d101b;outline:none;box-sizing:border-box;background:white;border:1px solid rgba(13,16,27,0.08);" />
            </label>
            <label style="display:block;">
              <span style="font-size:11px;font-weight:700;color:rgba(13,16,27,0.45);margin-bottom:6px;display:block;">Servings</span>
              <input type="number" min="1" value="{{ servings }}" onChange="{{ setServings }}"
                style="width:100%;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:500;font-family:Manrope,sans-serif;color:#0d101b;outline:none;box-sizing:border-box;background:white;border:1px solid rgba(13,16,27,0.08);" />
            </label>
          </div>

          <!-- Macros -->
          <div>
            <p style="margin:0 0 8px;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(13,16,27,0.35);">Macros (per serving)</p>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
              <label style="display:block;"><span style="font-size:11px;font-weight:700;color:rgba(13,16,27,0.45);margin-bottom:6px;display:block;">kcal</span>
                <input type="number" min="0" value="{{ kcal }}"    onChange="{{ setKcal }}"    style="width:100%;border-radius:12px;padding:10px 8px;font-size:13px;font-weight:600;font-family:Manrope,sans-serif;color:#0d101b;outline:none;box-sizing:border-box;background:white;border:1px solid rgba(13,16,27,0.08);" /></label>
              <label style="display:block;"><span style="font-size:11px;font-weight:700;color:rgba(13,16,27,0.45);margin-bottom:6px;display:block;">P (g)</span>
                <input type="number" min="0" value="{{ protein }}" onChange="{{ setProtein }}" style="width:100%;border-radius:12px;padding:10px 8px;font-size:13px;font-weight:600;font-family:Manrope,sans-serif;color:#0d101b;outline:none;box-sizing:border-box;background:white;border:1px solid rgba(13,16,27,0.08);" /></label>
              <label style="display:block;"><span style="font-size:11px;font-weight:700;color:rgba(13,16,27,0.45);margin-bottom:6px;display:block;">C (g)</span>
                <input type="number" min="0" value="{{ carbs }}"   onChange="{{ setCarbs }}"   style="width:100%;border-radius:12px;padding:10px 8px;font-size:13px;font-weight:600;font-family:Manrope,sans-serif;color:#0d101b;outline:none;box-sizing:border-box;background:white;border:1px solid rgba(13,16,27,0.08);" /></label>
              <label style="display:block;"><span style="font-size:11px;font-weight:700;color:rgba(13,16,27,0.45);margin-bottom:6px;display:block;">F (g)</span>
                <input type="number" min="0" value="{{ fat }}"     onChange="{{ setFat }}"     style="width:100%;border-radius:12px;padding:10px 8px;font-size:13px;font-weight:600;font-family:Manrope,sans-serif;color:#0d101b;outline:none;box-sizing:border-box;background:white;border:1px solid rgba(13,16,27,0.08);" /></label>
            </div>
          </div>

          <!-- Ingredients — single textarea, 5 rows -->
          <div>
            <p style="margin:0 0 8px;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(13,16,27,0.35);">Ingredients</p>
            <textarea placeholder="60g oats&#10;1 banana&#10;200ml oat milk&#10;1 tbsp honey&#10;Pinch of salt" value="{{ ingredients }}" onChange="{{ setIngredients }}" rows="5"
              style="width:100%;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:500;font-family:Manrope,sans-serif;color:#0d101b;outline:none;box-sizing:border-box;background:white;border:1px solid rgba(13,16,27,0.08);resize:none;line-height:1.55;"></textarea>
            <p style="margin:4px 0 0;font-size:11px;font-weight:500;color:rgba(13,16,27,0.32);">One ingredient per line</p>
          </div>

          <!-- Steps — single textarea, 5 rows -->
          <div>
            <p style="margin:0 0 8px;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(13,16,27,0.35);">Method</p>
            <textarea placeholder="Mix oats with milk&#10;Slice banana and add on top&#10;Drizzle honey&#10;Let rest 5 min&#10;Serve immediately" value="{{ steps }}" onChange="{{ setSteps }}" rows="5"
              style="width:100%;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:500;font-family:Manrope,sans-serif;color:#0d101b;outline:none;box-sizing:border-box;background:white;border:1px solid rgba(13,16,27,0.08);resize:none;line-height:1.55;"></textarea>
            <p style="margin:4px 0 0;font-size:11px;font-weight:500;color:rgba(13,16,27,0.32);">One step per line</p>
          </div>

        </sc-if>

        <!-- AI MODE -->
        <sc-if value="{{ isAI }}" hint-placeholder-val="{{ false }}">

          <div>
            <p style="margin:0 0 8px;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(13,16,27,0.35);">Ingredients</p>
            <textarea placeholder="List your ingredients, one per line&#10;e.g. 60g oats&#10;1 banana&#10;200ml oat milk&#10;1 tbsp honey&#10;Pinch of salt" value="{{ aiIngredients }}" onChange="{{ setAiIngredients }}" rows="5"
              style="width:100%;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:500;font-family:Manrope,sans-serif;color:#0d101b;outline:none;box-sizing:border-box;background:white;border:1px solid rgba(13,16,27,0.08);resize:none;line-height:1.55;"></textarea>
          </div>

          <div>
            <p style="margin:0 0 8px;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(13,16,27,0.35);">Method</p>
            <textarea placeholder="Describe the steps, one per line&#10;e.g. Mix oats with milk&#10;Slice banana and add on top&#10;Drizzle honey&#10;Let rest 5 min&#10;Serve immediately" value="{{ aiSteps }}" onChange="{{ setAiSteps }}" rows="5"
              style="width:100%;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:500;font-family:Manrope,sans-serif;color:#0d101b;outline:none;box-sizing:border-box;background:white;border:1px solid rgba(13,16,27,0.08);resize:none;line-height:1.55;"></textarea>
          </div>

          <p style="margin:0;font-size:12px;font-weight:500;color:#b3a0ff;">AI will parse and structure your recipe automatically.</p>

        </sc-if>

      </div>
    </div>

    <!-- ── Save button ── -->
    <div style="padding:16px 24px 24px;flex-shrink:0;">
      <button onClick="{{ handleCreate }}"
        style="width:100%;border-radius:14px;padding:14px;font-size:15px;font-weight:800;font-family:Manrope,sans-serif;background:#0d101b;color:white;border:none;cursor:pointer;transition:transform 0.1s;"
        style-hover="transform:scale(1.01)" style-active="transform:scale(0.99)">{{ btnLabel }}</button>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 640, &quot;height&quot;: 820},
  &quot;onClose&quot;:  {&quot;editor&quot;: null},
  &quot;onCreate&quot;: {&quot;editor&quot;: null}
}">
class Component extends DCLogic {
  state = {
    mode: 'manual',
    name: '', tag: 'Breakfast', blurb: '',
    prepMin: 10, servings: 1,
    kcal: 0, protein: 0, carbs: 0, fat: 0,
    ingredients: '', steps: '',
    aiIngredients: '', aiSteps: '',
  };

  renderVals() {
    const s = this.state;
    const st  = (k) => (e) => this.setState({ [k]: e.target.value });
    const sn  = (k) => (e) => this.setState({ [k]: Number(e.target.value) || 0 });
    const isManual = s.mode === 'manual';

    return {
      isManual, isAI: !isManual,

      manualTabKey: isManual  ? 'manual' : '',
      aiTabKey:     !isManual ? 'ai'     : '',

      setManual: () => this.setState({ mode: 'manual' }),
      setAI:     () => this.setState({ mode: 'ai' }),

      name: s.name, setName: st('name'),
      blurb: s.blurb, setBlurb: st('blurb'),

      isBreakfast: s.tag === 'Breakfast', setBreakfast: () => this.setState({ tag: 'Breakfast' }),
      isLunch:     s.tag === 'Lunch',     setLunch:     () => this.setState({ tag: 'Lunch' }),
      isDinner:    s.tag === 'Dinner',    setDinner:    () => this.setState({ tag: 'Dinner' }),
      isSnack:     s.tag === 'Snack',     setSnack:     () => this.setState({ tag: 'Snack' }),

      prepMin: s.prepMin, setPrepMin: sn('prepMin'),
      servings: s.servings, setServings: sn('servings'),
      kcal: s.kcal, setKcal: sn('kcal'),
      protein: s.protein, setProtein: sn('protein'),
      carbs: s.carbs, setCarbs: sn('carbs'),
      fat: s.fat, setFat: sn('fat'),

      ingredients: s.ingredients, setIngredients: st('ingredients'),
      steps: s.steps, setSteps: st('steps'),
      aiIngredients: s.aiIngredients, setAiIngredients: st('aiIngredients'),
      aiSteps: s.aiSteps, setAiSteps: st('aiSteps'),

      btnLabel: isManual ? 'Save recipe' : 'Generate recipe',
      onClose: () => this.props.onClose?.(),
      handleCreate: () => {
        const parse = (str) => str.split('\n').map((l) => l.trim()).filter(Boolean);
        const ings = isManual ? parse(s.ingredients) : parse(s.aiIngredients);
        const stsArr = isManual ? parse(s.steps) : parse(s.aiSteps);
        this.props.onCreate?.({
          name: s.name.trim() || 'Untitled recipe', tag: s.tag, blurb: s.blurb,
          prepMin: s.prepMin, servings: s.servings,
          macros: { kcal: s.kcal, protein: s.protein, carbs: s.carbs, fat: s.fat },
          ingredients: ings, steps: stsArr,
        });
        this.props.onClose?.();
      },
    };
  }
}
</script>
</body>
</html>
