<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="DailyGuidanceCard" description="Daily coaching guidance card — full-colour section tiles, larger readable text" -->
<helmet><script src="./ds-base.js"></script></helmet>
<div style="font-family: Manrope, sans-serif; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(13,16,27,0.07); max-width: 420px;">
  <p style="margin: 0 0 14px; font-size: 10px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(13,16,27,0.38);">Today's plan</p>
  <div style="display: flex; flex-direction: column; gap: 8px;">

    <div style="background: #b8e5c0; border-radius: 14px; padding: 14px 16px;">
      <p style="margin: 0 0 6px; font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: rgba(13,16,27,0.42);">do</p>
      <p style="margin: 0; font-size: 14px; font-weight: 600; color: #0d101b; line-height: 1.45; text-wrap: pretty;">{{ doToday }}</p>
    </div>

    <div style="background: #a0c6ff; border-radius: 14px; padding: 14px 16px;">
      <p style="margin: 0 0 6px; font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: rgba(13,16,27,0.42);">recover</p>
      <p style="margin: 0; font-size: 14px; font-weight: 600; color: #0d101b; line-height: 1.45; text-wrap: pretty;">{{ recoverFrom }}</p>
    </div>

    <div style="background: #e7e2db; border-radius: 14px; padding: 14px 16px;">
      <p style="margin: 0 0 6px; font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: rgba(107,94,78,0.55);">ignore</p>
      <p style="margin: 0; font-size: 14px; font-weight: 600; color: #6b5e4e; line-height: 1.45; text-wrap: pretty;">{{ ignoreToday }}</p>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 420, &quot;height&quot;: 280},
  &quot;doToday&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Hit 110g protein — you're halfway there.&quot;},
  &quot;recoverFrom&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Light legs today after yesterday's run.&quot;},
  &quot;ignoreToday&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;The scale this morning — it's water, not fat.&quot;}
}"></script>
</body>
</html>
