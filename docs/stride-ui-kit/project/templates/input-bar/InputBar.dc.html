<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="InputBar" description="Chat input bar with + button menu for input type selection — matches ChatPanel pattern" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    @keyframes ib-blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes ib-menu  { from{opacity:0;transform:translateY(6px) scale(.97)} to{opacity:1;transform:none} }
    [data-ib-plus]{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;transition:all .15s;background:#f8f8f8;color:rgba(13,16,27,.6);}
    [data-ib-plus="true"]{background:#b3a0ff;color:#0d101b;transform:rotate(45deg);}
  </style>
</helmet>
<div style="font-family: Manrope, sans-serif; padding: 16px; background: #f8f8f8; border-radius: 24px;">
  <div style="position: relative; display: flex; align-items: center; gap: 6px; background: white; border-radius: 18px; padding: 6px; box-shadow: 0 10px 34px rgba(13,16,27,0.14);">

    <!-- Plus button + popup -->
    <div style="position: relative; flex-shrink: 0;">
      <button onClick="{{ toggleMenu }}" aria-label="Add" data-ib-plus="{{ menuOpen }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round">
          <path d="M12 5v14M5 12h14"></path>
        </svg>
      </button>

      <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
        <div style="position: absolute; bottom: calc(100% + 10px); left: 0; width: 210px; background: white; border-radius: 16px; padding: 8px; box-shadow: 0 16px 44px rgba(13,16,27,0.18); border: 1px solid rgba(13,16,27,0.08); animation: ib-menu 0.16s ease; z-index: 20;">

          <button onClick="{{ clickPhoto }}" style="width:100%;display:flex;align-items:center;gap:12px;border-radius:10px;padding:10px 12px;font-family:Manrope,sans-serif;font-size:14px;font-weight:700;color:rgba(13,16,27,0.75);background:none;border:none;cursor:pointer;text-align:left;" style-hover="background:rgba(179,160,255,0.15)">
            <span style="color:#b3a0ff;display:flex;align-items:center;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8a2 2 0 0 1 2-2h2l2-2h6l2 2h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><circle cx="12" cy="13" r="3.5"></circle></svg>
            </span>
            Photo of meal
          </button>

          <button onClick="{{ clickBarcode }}" style="width:100%;display:flex;align-items:center;gap:12px;border-radius:10px;padding:10px 12px;font-family:Manrope,sans-serif;font-size:14px;font-weight:700;color:rgba(13,16,27,0.75);background:none;border:none;cursor:pointer;text-align:left;" style-hover="background:rgba(179,160,255,0.15)">
            <span style="color:#b3a0ff;display:flex;align-items:center;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 6v12M8 6v12M11 6v12M14 6v12M18 6v12M21 6v12"></path></svg>
            </span>
            Scan barcode
          </button>

          <button onClick="{{ clickOcr }}" style="width:100%;display:flex;align-items:center;gap:12px;border-radius:10px;padding:10px 12px;font-family:Manrope,sans-serif;font-size:14px;font-weight:700;color:rgba(13,16,27,0.75);background:none;border:none;cursor:pointer;text-align:left;" style-hover="background:rgba(179,160,255,0.15)">
            <span style="color:#b3a0ff;display:flex;align-items:center;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 8V6a2 2 0 0 1 2-2h2M16 4h2a2 2 0 0 1 2 2v2M20 16v2a2 2 0 0 1-2 2h-2M8 20H6a2 2 0 0 1-2-2v-2M7 12h10"></path></svg>
            </span>
            Nutrition label
          </button>

          <button onClick="{{ clickVoice }}" style="width:100%;display:flex;align-items:center;gap:12px;border-radius:10px;padding:10px 12px;font-family:Manrope,sans-serif;font-size:14px;font-weight:700;color:rgba(13,16,27,0.75);background:none;border:none;cursor:pointer;text-align:left;" style-hover="background:rgba(179,160,255,0.15)">
            <span style="color:#b3a0ff;display:flex;align-items:center;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"></path><path d="M5 11v1a7 7 0 0 0 14 0v-1"></path><path d="M12 19v3"></path></svg>
            </span>
            Voice note
          </button>

        </div>
      </sc-if>
    </div>

    <!-- Placeholder -->
    <span style="flex: 1; min-width: 0; font-size: 14px; font-weight: 500; color: rgba(13,16,27,0.35); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 4px;">{{ placeholder }}</span>

    <!-- Cursor -->
    <span style="width: 2px; height: 16px; background: #0d101b; opacity: 0.5; flex-shrink: 0; animation: ib-blink 1s steps(1) infinite;"></span>

    <!-- Mic button -->
    <button aria-label="Voice" style="flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#f8f8f8;border:none;color:rgba(13,16,27,0.6);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s;" style-hover="background:rgba(179,160,255,0.2)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"></path><path d="M5 11v1a7 7 0 0 0 14 0v-1"></path><path d="M12 19v3"></path></svg>
    </button>

    <!-- Send button -->
    <button aria-label="Send" style="flex-shrink:0;width:40px;height:40px;border-radius:50%;background:#0d101b;border:none;color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.1s;" style-hover="transform:scale(1.05)" style-active="transform:scale(0.95)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
    </button>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 480, &quot;height&quot;: 100},
  &quot;activeMode&quot;:   {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;type&quot;,&quot;voice&quot;,&quot;photo&quot;,&quot;barcode&quot;,&quot;ocr&quot;], &quot;default&quot;: &quot;type&quot;},
  &quot;onModeChange&quot;: {&quot;editor&quot;: null}
}">
class Component extends DCLogic {
  state = { menuOpen: false, activeMode: 'type' };

  renderVals() {
    const mode = this.props.activeMode || this.state.activeMode;
    const open = this.state.menuOpen;
    const placeholders = {
      type:    'had a bowl of oats with banana and almonds...',
      voice:   'Listening...',
      photo:   'Photo analysed — reviewing macros...',
      barcode: 'Point camera at barcode...',
      ocr:     'Scanning nutrition label...',
    };
    const select = (m) => {
      this.setState({ menuOpen: false, activeMode: m });
      this.props.onModeChange?.(m);
    };
    return {
      placeholder:  placeholders[mode] || placeholders.type,
      menuOpen:     open,
      toggleMenu:   () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      clickPhoto:   () => select('photo'),
      clickBarcode: () => select('barcode'),
      clickOcr:     () => select('ocr'),
      clickVoice:   () => select('voice'),
    };
  }
}
</script>
</body>
</html>
